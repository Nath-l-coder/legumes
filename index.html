<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Liste - Version Étiquettes Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --border-color: #e2e8f0;
            
            /* Couleurs style étiquette maraîchère */
            --retro-bg: #f9f5eb;
            --retro-border: #d9ceb2;
            --badge-green: #27ae60;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1050px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        }

        .no-print { display: block; }
        h1 { text-align: center; margin-bottom: 30px; color: var(--dark); }

        .form-container {
            background: var(--light);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .form-row > * {
            flex: 1;
            min-width: 150px;
        }

        .form-row > .input-large {
            flex: 2;
        }

        input, select, button {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }
        
        /* Style spécifique pour l'input file */
        input[type="file"] {
            background: white;
            padding: 9px;
            cursor: pointer;
        }

        input:focus, select:focus { border-color: var(--primary); }
        button { cursor: pointer; font-weight: bold; transition: all 0.2s; }
        
        .btn-search { background: var(--primary); color: white; border: none; }
        .btn-search:hover { background: #2980b9; }
        
        .btn-add { background: var(--success); color: white; border: none; height: 100%; }
        .btn-add:hover { background: #27ae60; }

        .view-toggle-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .btn-toggle {
            width: auto;
            padding: 10px 20px;
            background: #cbd5e1;
            color: var(--dark);
            border: none;
        }
        .btn-toggle.active {
            background: var(--dark);
            color: white;
        }

        /* Galerie d'images */
        .gallery-title { margin-top: 15px; margin-bottom: 5px; font-size: 14px; color: #7f8c8d; display: none;}
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 10px;
            max-height: 140px;
            overflow-y: auto;
            border-radius: 6px;
            background: #fff;
            padding: 10px;
            border: 1px solid #ddd;
        }

        .gallery-item {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 3px solid transparent;
        }
        .gallery-item.selected { border-color: var(--success); box-shadow: 0 0 8px rgba(46, 204, 113, 0.6); }

        /* --- MODE 1 : STYLE TABLEAU ÉCRAN --- */
        table { 
            width: 100%; 
            border-collapse: collapse;
            background: white;
        }
        th, td { 
            padding: 14px 18px; 
            text-align: left; 
            vertical-align: middle; 
            font-size: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        th { 
            background-color: #2c3e50; 
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
        }
        tbody tr:nth-child(even) { background-color: #fcfdfe; }
        .item-img { width: 65px; height: 65px; object-fit: cover; border-radius: 6px; border: 1px solid #cbd5e1; display: block; }
        .col-aliment { font-weight: 600; font-size: 16px; color: #1e293b; }
        .col-prix { font-weight: 700; color: #16a34a; font-size: 16px; }
        .col-unite { color: #64748b; font-size: 14px; }

        /* --- MODE 2 : STYLE CARTES ÉCRAN --- */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .veggie-card {
            background-color: var(--retro-bg);
            border: 2px dashed var(--retro-border);
            border-radius: 8px;
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            box-sizing: border-box;
            height: 310px;
            justify-content: space-between;
        }

        .card-price-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 75px;
            height: 75px;
            background-color: var(--badge-green);
            color: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 2;
        }
        .card-price-val { font-size: 16px; line-height: 1.2; font-weight: 800; }
        .card-price-unit { font-size: 10px; text-transform: uppercase; opacity: 0.95; margin-top: 2px; font-weight: 600;}

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 5px;
        }

        .card-title {
            font-family: 'Times New Roman', Times, serif;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            text-transform: capitalize;
            border-top: 1px dashed var(--retro-border);
            width: 100%;
            padding-top: 10px;
            margin-top: 10px;
        }

        .card-action-layer {
            position: absolute;
            bottom: 45px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .btn-delete { background: #fff; color: var(--danger); border: 1px solid var(--danger); width: auto; padding: 4px 10px; border-radius: 4px; font-size: 12px;}
        .btn-delete:hover { background: var(--danger); color: white; }
        
        .btn-main { background: var(--dark); color: white; border: none; padding: 15px; font-size: 16px; margin-top: 10px; border-radius: 6px; width: auto; display: inline-block;}
        .btn-main:hover { background: #1a252f; }

        .view-mode-cards table { display: none; }
        .view-mode-table .cards-grid { display: none; }
        .view-mode-table .card-action-layer { display: none; }

        /* --- IMPRESSION PDF (3x3 A4) --- */
        #print-pdf-zone {
            display: none;
            width: 190mm;
            background: #ffffff;
            margin: 0;
            padding: 0;
        }

        .pdf-page {
            width: 190mm;
            height: 277mm;
            page-break-after: always;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(3, 60mm);
            grid-template-rows: repeat(3, 85mm);
            gap: 5mm;
            align-content: start;
        }

        .pdf-page .veggie-card {
            width: 60mm;
            height: 85mm;
            background-color: #f9f5eb !important;
            border: 1.5px dashed #d9ceb2 !important;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .pdf-page .card-price-badge {
            background-color: #27ae60 !important;
            color: white !important;
            width: 22mm;
            height: 22mm;
            top: 2mm;
            right: 2mm;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        
        .pdf-page .card-img {
            height: 48mm;
        }

        .pdf-page .no-pdf { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="no-print">Ma Liste d'Étiquettes</h1>

    <div class="form-container no-print">
        <div class="form-row">
            <input type="text" id="aliment" class="input-large" placeholder="Élément à chercher (ex: Pomme De Terre...)">
            <button class="btn-search" onclick="rechercherImages()">🔍 Image via Web</button>
            <input type="file" id="imageLocal" accept="image/*" title="Ou choisir une image locale" onchange="chargerImageLocale(event)">
        </div>
        
        <div class="form-row">
            <input type="number" id="prix" placeholder="Prix (€)" step="0.01" min="0">
            <select id="unite">
                <option value="le kilo">le kilo</option>
                <option value="l'unité">l'unité</option>
                <option value="le lot">le lot</option>
                <option value="la pièce">la pièce</option>
            </select>
            <button class="btn-add" class="input-large" onclick="ajouterLigne()">Ajouter à la liste</button>
        </div>

        <div class="gallery-title" id="gallery-title">Cliquez sur l'image de votre choix :</div>
        <div class="image-gallery" id="gallery" style="display: none;"></div>
    </div>

    <div class="view-toggle-container no-print">
        <button class="btn-toggle" id="toggle-table" onclick="changerVue('table')">📊 Vue Tableau</button>
        <button class="btn-toggle active" id="toggle-cards" onclick="changerVue('cards')">🎴 Vue Étiquettes / Cartes</button>
    </div>

    <div id="screen-content" class="view-mode-cards">
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">Visuel</th>
                    <th style="width: 45%;">Élément</th>
                    <th style="width: 15%;">Prix</th>
                    <th style="width: 15%;">Unité</th>
                    <th style="width: 10%;">Action</th>
                </tr>
            </thead>
            <tbody id="tableau-corps"></tbody>
        </table>
        <div class="cards-grid" id="cartes-corps"></div>
    </div>

    <div class="no-print" style="margin-top: 20px; display:flex; flex-wrap:wrap; gap:10px; justify-content:center;">
        <button class="btn-main" onclick="genererPDF()">🖨️ Étiquettes (PDF)</button>
        <button class="btn-main" style="background: #8e44ad;" onclick="genererPDFTableau()">📄 Tableau (PDF)</button>
        <button class="btn-main" style="background: #2ecc71;" onclick="telechargerCSV()">📥 Tableau (CSV)</button>
        <button class="btn-main" style="background: #e74c3c;" onclick="viderCache()">🗑️ Vider la liste</button>
    </div>
</div>

<div id="print-pdf-zone"></div>

<script>
    let urlImageSelectionnee = "";
    let vueActuelle = "cards";
    
    function changerVue(mode) {
        vueActuelle = mode;
        const conteneur = document.getElementById('screen-content');
        const btnTable = document.getElementById('toggle-table');
        const btnCards = document.getElementById('toggle-cards');

        if(mode === 'table') {
            conteneur.className = "view-mode-table";
            btnTable.classList.add('active');
            btnCards.classList.remove('active');
        } else {
            conteneur.className = "view-mode-cards";
            btnCards.classList.add('active');
            btnTable.classList.remove('active');
        }
    }

    function sauvegarderTableau() {
        const tbody = document.getElementById('tableau-corps');
        const lignes = tbody.querySelectorAll('tr');
        const donnees = [];
        
        lignes.forEach(tr => {
            const cells = tr.querySelectorAll('td');
            donnees.push({
                image: cells[0].querySelector('img').src,
                aliment: cells[1].textContent,
                prix: cells[2].textContent.replace(' €', ''),
                unite: cells[3].textContent
            });
        });
        localStorage.setItem('maListe', JSON.stringify(donnees));
    }
    
    function chargerTableau() {
        const donnees = localStorage.getItem('maListe');
        if (donnees) {
            const lignes = JSON.parse(donnees);
            lignes.forEach(ligne => createDOMRow(ligne.image, ligne.aliment, ligne.prix, ligne.unite));
        }
        changerVue('cards');
    }

    function createDOMRow(imgUrl, aliment, prix, unite) {
        const idUnique = 'item-' + Date.now() + Math.random().toString(36).substr(2, 5);
        const prixFormate = parseFloat(prix).toFixed(2);

        // 1. Tableau
        const tbody = document.getElementById('tableau-corps');
        const tr = document.createElement('tr');
        tr.id = 'tr-' + idUnique;
        tr.innerHTML = `
            <td><img class="item-img" src="${imgUrl}" alt="${aliment}"></td>
            <td class="col-aliment">${aliment}</td>
            <td class="col-prix">${prixFormate} €</td>
            <td class="col-unite">${unite}</td>
            <td><button class="btn-delete" onclick="supprimerElement('${idUnique}')">Supprimer</button></td>
        `;
        tbody.appendChild(tr);

        // 2. Cartes
        const carteCorps = document.getElementById('cartes-corps');
        const card = document.createElement('div');
        card.className = "veggie-card";
        card.id = 'card-' + idUnique;
        card.innerHTML = `
            <div class="card-price-badge">
                <div class="card-price-val">${prixFormate}€</div>
                <div class="card-price-unit">${unite.replace("l'", "")}</div>
            </div>
            <img class="card-img" src="${imgUrl}" alt="${aliment}">
            <div class="card-title">${aliment}</div>
            <div class="card-action-layer no-pdf">
                <button class="btn-delete" onclick="supprimerElement('${idUnique}')">Supprimer</button>
            </div>
        `;
        carteCorps.appendChild(card);
    }
    
    function viderCache() {
        if (confirm('Êtes-vous sûr de vouloir vider la liste ?')) {
            localStorage.removeItem('maListe');
            document.getElementById('tableau-corps').innerHTML = '';
            document.getElementById('cartes-corps').innerHTML = '';
        }
    }
    
    window.addEventListener('load', chargerTableau); 

    // CHARGEMENT DE L'IMAGE LOCALE
    function chargerImageLocale(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                urlImageSelectionnee = e.target.result; // Format Base64
                
                // Afficher l'aperçu
                const gallery = document.getElementById('gallery');
                const galleryTitle = document.getElementById('gallery-title');
                
                gallery.style.display = "flex";
                gallery.innerHTML = `<img src="${urlImageSelectionnee}" class="gallery-item selected" alt="Image Locale" style="width: 100px; height: 100px;">`;
                galleryTitle.style.display = "block";
                galleryTitle.innerText = "Image locale importée avec succès :";
            };
            reader.readAsDataURL(file);
        }
    }

    async function rechercherImages() {
        const recherche = document.getElementById('aliment').value.trim();
        const gallery = document.getElementById('gallery');
        const galleryTitle = document.getElementById('gallery-title');
        
        if(recherche === "") {
            alert("Veuillez d'abord écrire le nom de l'élément.");
            return;
        }

        gallery.style.display = "grid";
        gallery.innerHTML = "<p style='padding:10px; color:gray;'>Recherche d'illustrations...</p>";
        galleryTitle.style.display = "block";
        galleryTitle.innerText = "Cliquez sur l'image de votre choix :";

        try {
            const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(recherche)}&gsrnamespace=6&prop=imageinfo&iiprop=url&iiurlwidth=300&format=json&origin=*`;
            const response = await fetch(url);
            const data = await response.json();
            gallery.innerHTML = "";

            if (!data.query || !data.query.pages) {
                genererPlaceholder(recherche);
                return;
            }

            const pages = Object.values(data.query.pages);
            let imagesTrouvees = 0;

            pages.forEach(page => {
                if (page.imageinfo && page.imageinfo[0]) {
                    imagesTrouvees++;
                    const thumbUrl = page.imageinfo[0].thumburl;

                    const img = document.createElement('img');
                    img.src = thumbUrl;
                    img.className = "gallery-item";
                    img.alt = recherche;
                    
                    img.onclick = function() {
                        document.querySelectorAll('.gallery-item').forEach(i => i.classList.remove('selected'));
                        img.classList.add('selected');
                        urlImageSelectionnee = thumbUrl; 
                    };
                    gallery.appendChild(img);
                }
            });

            if (imagesTrouvees === 0) {
                genererPlaceholder(recherche);
            } else if(gallery.firstChild) {
                gallery.firstChild.click();
            }

        } catch (error) {
            console.error(error);
            genererPlaceholder(recherche);
        }
    }

    function genererPlaceholder(texte) {
        const initiales = texte.substring(0, 2).toUpperCase();
        urlImageSelectionnee = `https://placehold.co/300x300/27ae60/ffffff?text=${initiales}`;
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "<p style='padding:10px; color:orange;'>Visuel par défaut généré.</p>";
    }

    function ajouterLigne() {
        const alimentInput = document.getElementById('aliment');
        const prixInput = document.getElementById('prix');
        const uniteSelect = document.getElementById('unite');
        const inputImageLocal = document.getElementById('imageLocal');

        const aliment = alimentInput.value.trim();
        const prix = prixInput.value;
        const unite = uniteSelect.value;

        if (aliment === "" || prix === "") {
            alert("Veuillez remplir le nom et le prix.");
            return;
        }

        if (!urlImageSelectionnee) { genererPlaceholder(aliment); }

        createDOMRow(urlImageSelectionnee, aliment, prix, unite);
        sauvegarderTableau();

        alimentInput.value = '';
        prixInput.value = '';
        inputImageLocal.value = ''; // Reset de l'input fichier
        document.getElementById('gallery').innerHTML = "";
        document.getElementById('gallery').style.display = "none";
        document.getElementById('gallery-title').style.display = "none";
        urlImageSelectionnee = ""; 
        alimentInput.focus();
    }

    function supprimerElement(idUnique) {
        document.getElementById('tr-' + idUnique)?.remove();
        document.getElementById('card-' + idUnique)?.remove();
        sauvegarderTableau();
    }

    function telechargerCSV() {
        const donneesStockees = localStorage.getItem('maListe');
        if (!donneesStockees || JSON.parse(donneesStockees).length === 0) {
            alert("Le tableau est vide.");
            return;
        }
        
        const liste = JSON.parse(donneesStockees);
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
        
        csvContent += "Élément;Prix (€);Unité;Lien Image\r\n";
        
        liste.forEach(item => {
            let ligne = `"${item.aliment.replace(/"/g, '""')}";"${item.prix}";"${item.unite}";"${item.image}"\r\n`;
            csvContent += ligne;
        });
        
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "tableau_elements_prix.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // NOUVEAU: GENERER LE PDF DU TABLEAU
    function genererPDFTableau() {
        const tbody = document.getElementById('tableau-corps');
        if (tbody.children.length === 0) {
            alert("Le tableau est vide.");
            return;
        }

        // Créer un clone propre du tableau sans les boutons de suppression
        const tableOriginale = document.querySelector('table');
        const tableClone = tableOriginale.cloneNode(true);
        
        // Retirer la dernière colonne (Action) des th
        const headers = tableClone.querySelectorAll('th');
        if (headers.length > 0) headers[headers.length - 1].remove();
        
        // Retirer la dernière colonne des td
        const rows = tableClone.querySelectorAll('tbody tr');
        rows.forEach(row => {
            const cells = row.querySelectorAll('td');
            if (cells.length > 0) cells[cells.length - 1].remove();
        });

        // Mettre en page dans un conteneur propre pour le PDF
        const pdfContainer = document.createElement('div');
        pdfContainer.style.padding = '20px';
        pdfContainer.style.background = 'white';
        
        const titre = document.createElement('h2');
        titre.innerText = "Tableau des prix et produits";
        titre.style.textAlign = "center";
        titre.style.color = "#2c3e50";
        titre.style.fontFamily = "sans-serif";
        
        pdfContainer.appendChild(titre);
        pdfContainer.appendChild(tableClone);

        const options = {
            margin:       10,
            filename:     'liste-tableau-prix.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(options).from(pdfContainer).save();
    }

    // GENERER LE PDF DES ETIQUETTES
    function genererPDF() {
        const cartesNormales = document.querySelectorAll('#cartes-corps .veggie-card');
        
        if (cartesNormales.length === 0) {
            alert("Votre liste est vide.");
            return;
        }

        const zoneImpression = document.getElementById('print-pdf-zone');
        zoneImpression.innerHTML = ""; 
        zoneImpression.style.display = "block"; 

        let pageActuelle = document.createElement('div');
        pageActuelle.className = "pdf-page";
        zoneImpression.appendChild(pageActuelle);

        let compteurCartes = 0;

        cartesNormales.forEach((carteOriginale) => {
            if (compteurCartes > 0 && compteurCartes % 9 === 0) {
                pageActuelle = document.createElement('div');
                pageActuelle.className = "pdf-page";
                zoneImpression.appendChild(pageActuelle);
            }

            const clone = carteOriginale.cloneNode(true);
            const actionLayer = clone.querySelector('.card-action-layer');
            if(actionLayer) actionLayer.remove(); 

            pageActuelle.appendChild(clone);
            compteurCartes++;
        });

        const options = {
            margin:       [10, 10, 10, 10], 
            filename:     'planches-etiquettes.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { 
                scale: 3, 
                useCORS: true, 
                letterRendering: true,
                scrollY: 0,
                scrollX: 0
            },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(options).from(zoneImpression).save().then(() => {
            zoneImpression.style.display = "none";
            zoneImpression.innerHTML = "";
        });
    }
</script>

</body>
</html>
